# ── Build ──────────────────────────────────────────────────────
[build]
  publish = "."

# ── Headers globaux ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Cache images (1 an) ────────────────────────────────────────
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache CSS / JS (1 mois) ────────────────────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# ── HTML toujours frais ────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── HTTP → HTTPS ───────────────────────────────────────────────
[[redirects]]
  from = "http://59-cezanne.com/*"
  to   = "https://59-cezanne.com/:splat"
  status = 301
  force  = true

# ── Compression + minification ─────────────────────────────────
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle  = true
  minify  = true
[build.processing.js]
  minify  = true
[build.processing.images]
  compress = true
